server:
    port: 8080

spring:
    datasource:
        url: jdbc:mysql://127.0.0.1:3306/my_knowledge_base?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
        username: root
        password: 88888888
        driver-class-name: com.mysql.cj.jdbc.Driver
    web:
        resources:
            static-locations: classpath:/static/,file:./uploads/

sa-token:
    # token 有效期，单位秒 (此处配置 7天)
    timeout: 604800
    # 恢复成默认的 uuid 风格（短小精悍）
    token-style: uuid
    is-log: true